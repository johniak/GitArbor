name: Release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install
      - name: Verify tag matches package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::tag $TAG_VER does not match package.json $PKG_VER"
            exit 1
          fi
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run test
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: npx playwright install --with-deps
      - name: E2E
        run: xvfb-run --auto-servernum -- bun run test:e2e

  build:
    name: Build (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot
      - run: bun install
      - run: bun run make
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: out/make/**/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GitArbor ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.nupkg
            dist/**/RELEASES
